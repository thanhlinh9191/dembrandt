<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>dembrandt gold labeler</title>
  <style>
    :root {
      --bg: #0f0f10;
      --panel: #1a1a1d;
      --border: #2a2a2f;
      --text: #e8e8ea;
      --muted: #9090a0;
      --accent: #635bff;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      height: 44px;
    }
    header h1 { font-size: 13px; font-weight: 600; color: var(--muted); }
    .site-link { font-size: 13px; font-weight: 600; color: var(--text); text-decoration: none; }
    .site-link:hover { color: var(--accent); }
    .progress { color: var(--muted); font-size: 12px; margin-left: auto; }
    .btn-open {
      font-size: 11px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
    }
    .btn-open:hover { color: var(--text); }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* screenshot */
    .screenshot-pane {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    .screenshot-pane img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top center;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* token review panel */
    .side {
      width: 300px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .token-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 16px;
      text-align: center;
    }

    .token-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .color-swatch {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .token-value {
      font-size: 22px;
      font-family: monospace;
      font-weight: 600;
    }

    .palette-swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .palette-swatch {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .ai-hint {
      font-size: 11px;
      color: #f59e0b;
      background: rgba(245,158,11,0.08);
      border-radius: 6px;
      padding: 6px 10px;
      max-width: 240px;
    }

    .correction {
      display: none;
      width: 100%;
    }
    .correction.visible { display: block; }
    .correction input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: monospace;
      outline: none;
      text-align: center;
    }
    .correction input:focus { border-color: var(--accent); }

    .actions {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter .1s;
    }
    button:hover:not(:disabled) { filter: brightness(1.15); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-yes   { background: var(--green); color: #042b0e; }
    .btn-no    { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-save  { background: var(--accent); color: #fff; }
    .btn-skip  { background: transparent; color: var(--muted); font-size: 12px; font-weight: 400; flex: none; padding: 8px 12px; }

    .step-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
    }
    .dot.done { background: var(--green); }
    .dot.active { background: var(--accent); }

    #status-msg { font-size: 12px; color: var(--muted); text-align: center; min-height: 16px; }

    .done-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
    }
    .done-screen.visible { display: flex; }
    .done-screen h2 { color: var(--text); font-size: 18px; }
    code { font-family: monospace; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>gold labeler</h1>
  <a class="site-link" id="site-link" href="#" target="_blank">—</a>
  <a class="btn-open" id="btn-open" href="#" target="_blank">open ↗</a>
  <span class="progress" id="progress"></span>
</header>

<div class="main" id="main">
  <div class="screenshot-pane">
    <div class="loading" id="loading-msg">extracting...</div>
    <img id="screenshot" src="" alt="" style="display:none">
  </div>

  <div class="side">
    <div class="token-card" id="token-card">
      <div class="token-label" id="token-label">primary color</div>
      <div class="color-swatch" id="color-swatch" style="display:none"></div>
      <div class="palette-swatches" id="palette-swatches" style="display:none"></div>
      <div class="token-value" id="token-value">—</div>
      <div class="ai-hint" id="ai-hint" style="display:none"></div>
      <div class="correction" id="correction">
        <input id="correction-input" type="text" placeholder="">
      </div>
    </div>

    <div class="actions">
      <div class="step-dots" id="step-dots"></div>
      <div class="btn-row" id="phase-review">
        <button class="btn-yes" id="btn-yes">✓ Correct</button>
        <button class="btn-no"  id="btn-no">✗ Wrong</button>
      </div>
      <div class="btn-row" id="phase-fix" style="display:none">
        <button class="btn-save" id="btn-fix">Save correction</button>
      </div>
      <div class="btn-row">
        <button class="btn-skip" id="btn-skip">Skip site</button>
      </div>
      <div id="status-msg"></div>
    </div>
  </div>
</div>

<div class="done-screen" id="done-screen">
  <h2>All sites labeled</h2>
  <p>Run <code>npm run gold:run</code> to score.</p>
</div>

<script>
const $ = id => document.getElementById(id);

// Steps per site
const STEPS = ['primary', 'secondary', 'font', 'palette'];

let state = {
  site: null,
  extraction: null,
  aiSuggestion: null,
  step: 0,
  answers: {},   // { primary, secondary, font, palette }
};

// ── helpers ───────────────────────────────────────────────────

function toHex(color) {
  if (!color) return null;
  if (color.startsWith('#')) return color.toLowerCase();
  const m = color.match(/rgba?\(\s*(\d+),\s*(\d+),\s*(\d+)/i);
  if (!m) return null;
  return '#' + [m[1],m[2],m[3]].map(n=>(+n).toString(16).padStart(2,'0')).join('');
}

function topFont(typography) {
  const counts = {};
  for (const s of (typography?.styles || [])) {
    const f = s.fontFamily || s.family;
    if (f) counts[f] = (counts[f]||0) + 1;
  }
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
}

function extractedValues(ext) {
  const sem = ext?.colors?.semantic || {};
  const pal = ext?.colors?.palette || [];
  const high = pal.filter(p=>p.confidence==='high');
  return {
    primary:   toHex(sem.primary)   || toHex(high[0]?.color) || toHex(pal[0]?.color),
    secondary: toHex(sem.secondary) || toHex(high[1]?.color) || toHex(pal[1]?.color),
    font:      topFont(ext?.typography),
    palette:   pal.slice(0,6).map(p=>toHex(p.color)).filter(Boolean),
  };
}

// ── render step ───────────────────────────────────────────────

function renderStep() {
  const step = STEPS[state.step];
  const vals = extractedValues(state.extraction);
  const ai = state.aiSuggestion;

  // dots
  const dots = $('step-dots');
  dots.innerHTML = '';
  STEPS.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.step ? ' done' : i === state.step ? ' active' : '');
    dots.appendChild(d);
  });

  // hide correction
  $('correction').classList.remove('visible');
  $('phase-review').style.display = 'flex';
  $('phase-fix').style.display = 'none';
  $('status-msg').textContent = '';

  const label = $('token-label');
  const swatch = $('color-swatch');
  const palSwatches = $('palette-swatches');
  const val = $('token-value');
  const hint = $('ai-hint');

  hint.style.display = 'none';
  swatch.style.display = 'none';
  palSwatches.style.display = 'none';

  if (step === 'primary') {
    label.textContent = 'Primary color';
    const hex = vals.primary;
    swatch.style.background = hex || '#333';
    swatch.style.display = 'block';
    val.textContent = hex || '(none found)';
    if (ai?.primary_hex && ai.primary_hex.toLowerCase() !== (hex||'').toLowerCase()) {
      hint.textContent = `AI suggests: ${ai.primary_hex} — ${ai.primary_description||''}`;
      hint.style.display = 'block';
    }
    $('correction-input').placeholder = '#635bff';
    $('correction-input').value = hex || '';
  }
  else if (step === 'secondary') {
    label.textContent = 'Secondary color';
    const hex = vals.secondary;
    swatch.style.background = hex || '#333';
    swatch.style.display = 'block';
    val.textContent = hex || '(none found)';
    $('correction-input').placeholder = '#0a2540';
    $('correction-input').value = hex || '';
  }
  else if (step === 'font') {
    label.textContent = 'Primary font';
    swatch.style.display = 'none';
    val.textContent = vals.font || '(none found)';
    if (ai?.primary_font_guess && ai.primary_font_guess !== vals.font) {
      hint.textContent = `AI suggests: ${ai.primary_font_guess}`;
      hint.style.display = 'block';
    }
    $('correction-input').placeholder = 'Inter';
    $('correction-input').value = vals.font || '';
  }
  else if (step === 'palette') {
    label.textContent = 'Brand palette';
    palSwatches.style.display = 'flex';
    palSwatches.innerHTML = '';
    for (const c of vals.palette) {
      const d = document.createElement('div');
      d.className = 'palette-swatch';
      d.style.background = c;
      d.title = c;
      palSwatches.appendChild(d);
    }
    val.textContent = vals.palette.length ? vals.palette.join(', ') : '(none)';
    val.style.fontSize = '11px';
    $('correction-input').placeholder = '#635bff, #0a2540, #f6f9fc';
    $('correction-input').value = vals.palette.join(', ');
  }
}

// ── site loading ──────────────────────────────────────────────

async function loadNext() {
  const status = await fetch('/api/status').then(r=>r.json());
  $('progress').textContent = `${status.done}/${status.total}`;

  if (!status.next) {
    $('main').style.display = 'none';
    $('done-screen').classList.add('visible');
    return;
  }

  const site = status.next;
  state = { site, extraction: null, aiSuggestion: null, step: 0, answers: {} };

  $('site-link').textContent = new URL(site.url).hostname;
  $('site-link').href = site.url;
  $('btn-open').href = site.url;
  $('screenshot').style.display = 'none';
  $('loading-msg').style.display = 'flex';
  $('loading-msg').textContent = 'extracting...';
  $('token-value').textContent = '—';
  $('color-swatch').style.display = 'none';
  $('palette-swatches').style.display = 'none';
  $('ai-hint').style.display = 'none';
  $('step-dots').innerHTML = '';

  let ext;
  try {
    ext = await fetch('/api/extract', {
      method: 'POST',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({url: site.url}),
    }).then(r=>r.json());
  } catch(e) {
    $('loading-msg').textContent = 'extraction failed';
    return;
  }

  state.extraction = ext;

  if (ext._screenshotPath) {
    $('screenshot').src = '/api/screenshot?path=' + encodeURIComponent(ext._screenshotPath) + '&t=' + Date.now();
    $('screenshot').onload = () => {
      $('loading-msg').style.display = 'none';
      $('screenshot').style.display = 'block';
    };
  } else {
    $('loading-msg').textContent = 'no screenshot';
  }

  renderStep();

  // AI in background
  if (ext._screenshotPath) {
    fetch('/api/ai-suggest', {
      method: 'POST',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({url: site.url, screenshotPath: ext._screenshotPath}),
    }).then(r=>r.json()).then(ai => {
      if (ai.error || !ai.enabled) return;
      state.aiSuggestion = ai;
      renderStep();
    }).catch(()=>{});
  }
}

// ── navigation ────────────────────────────────────────────────

function nextStep() {
  state.step++;
  if (state.step >= STEPS.length) {
    saveSite();
  } else {
    $('token-value').style.fontSize = '22px';
    renderStep();
  }
}

$('btn-yes').addEventListener('click', () => {
  // accept extracted value as-is
  const vals = extractedValues(state.extraction);
  state.answers[STEPS[state.step]] = vals[STEPS[state.step]];
  nextStep();
});

$('btn-no').addEventListener('click', () => {
  $('correction').classList.add('visible');
  $('phase-review').style.display = 'none';
  $('phase-fix').style.display = 'flex';
  $('correction-input').focus();
});

$('btn-fix').addEventListener('click', () => {
  const raw = $('correction-input').value.trim();
  const step = STEPS[state.step];
  if (step === 'palette') {
    state.answers.palette = raw.split(',').map(s=>s.trim()).filter(Boolean);
  } else {
    state.answers[step] = raw || null;
  }
  nextStep();
});

$('correction-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('btn-fix').click();
  if (e.key === 'Escape') {
    $('correction').classList.remove('visible');
    $('phase-review').style.display = 'flex';
    $('phase-fix').style.display = 'none';
  }
});

$('btn-skip').addEventListener('click', async () => {
  await fetch('/api/skip', {
    method: 'POST',
    headers: {'content-type':'application/json'},
    body: JSON.stringify({url: state.site.url}),
  });
  loadNext();
});

async function saveSite() {
  const ext = state.extraction;
  const vals = extractedValues(ext);
  const a = state.answers;

  const payload = {
    url: state.site.url,
    viewport: { width: 1440, height: 900 },
    primary:      a.primary      ?? vals.primary,
    secondary:    a.secondary    ?? vals.secondary,
    brandPalette: a.palette      ?? vals.palette,
    primaryFont:  a.font         ?? vals.font,
    logoUrl:      ext?.logo?.source || null,
  };

  await fetch('/api/save', {
    method: 'POST',
    headers: {'content-type':'application/json'},
    body: JSON.stringify(payload),
  });
  $('status-msg').textContent = 'saved.';
  setTimeout(loadNext, 400);
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'y' || e.key === 'Enter') $('btn-yes').click();
  if (e.key === 'n')                       $('btn-no').click();
  if (e.key === 's')                       $('btn-skip').click();
});

loadNext();
</script>
</body>
</html>
