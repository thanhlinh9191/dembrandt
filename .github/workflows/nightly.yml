name: Nightly Full QA

on:
  workflow_dispatch:

jobs:
  full-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Split sites and extract chunk ${{ matrix.chunk }}
        run: |
          node -e "
            const sites = JSON.parse(require('fs').readFileSync('test/sites.json','utf8'));
            const chunk = sites.filter((_, i) => i % 4 === ${{ matrix.chunk }});
            require('fs').writeFileSync('test/sites-chunk.json', JSON.stringify(chunk));
            console.log('Chunk ${{ matrix.chunk }}:', chunk.join(', '));
          "
          node test/qa.mjs --baseline --ci --sites-file sites-chunk.json
        env:
          CI: true

      - name: Upload chunk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-chunk-${{ matrix.chunk }}
          path: test/golden/
          retention-days: 30
